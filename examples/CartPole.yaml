# Reaches optimality in 24k steps (1.6h), stabilizes around 33k (2.5h)
name: "CartPole"

# Training recipe
training:
  # Setup
  seed: 42

  # Timesteps
  steps: 1e+6
  pretrain_steps: 1024

  # Training frequency
  replay_ratio: 0.5

  # Sample dimensions
  batch_size: 16
  sequence_length: 64
  imagination_horizon: 15

  # Discount parameters
  gamma: .997
  lmbda: .95
  tau: .02

# Buffer configuration
buffer:
  capacity: 1e+6

# Scaling configuration
scaler:
  eps: 1.0

# Environment configuration
environment:
  num_envs: 4
  name: 'CartPole-v1'
  actions:
    - type: "Discrete"
      options: 2

# Model configuration
model:
  default:
    # Hidden dimensions
    embedded: 256
    blocks: 1
    dense: 256

    # Output dimensions
    stochastic_dim: 32
    deterministic_dim: 256

    # Bins
    categorical_bins: 32
    reward_bins: 255

  rssm:
    learnable_initial_state: false
