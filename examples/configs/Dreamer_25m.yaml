# Reaches optimality in 24k steps (1.6h), stabilizes around 33k (2.5h)
name: "Dreamer_25M"

# Model configuration
model:
  global:
    # Guidelines for scaling: Generally depth=classes and units=hidden, then deter is 8xhidden
    # Hidden dimensions
    embedded: 384  # Units, in original, controls all encoder/decoder layers
    blocks: 24  # Depth, in original
    dense: 384  # Hidden, in original

    # Bins
    categorical_bins: 24  # Classes, in original

    # Output dimensions
    deterministic_dim: 3072  # Deter, in original
