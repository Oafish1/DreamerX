# Reaches optimality in 24k steps (1.6h), stabilizes around 33k (2.5h)
name: "Dreamer_12M"

# Model configuration
model:
  global:
    # Guidelines for scaling: Generally depth=classes and units=hidden, then deter is 8xhidden
    # Hidden dimensions
    embedded: 256  # Units, in original, controls all encoder/decoder layers
    blocks: 16  # Depth, in original
    dense: 256  # Hidden, in original

    # Bins
    categorical_bins: 16  # Classes, in original

    # Output dimensions
    deterministic_dim: 2048  # Deter, in original
