# Reaches optimality in 24k steps (1.6h), stabilizes around 33k (2.5h)
name: "Dreamer_400M"

# Model configuration
model:
  global:
    # Guidelines for scaling: Generally depth=classes and units=hidden, then deter is 8xhidden
    # Hidden dimensions
    embedded: 1536  # Units, in original, controls all encoder/decoder layers
    blocks: 96  # Depth, in original
    dense: 1536  # Hidden, in original

    # Bins
    categorical_bins: 96  # Classes, in original

    # Output dimensions
    deterministic_dim: 12288  # Deter, in original
