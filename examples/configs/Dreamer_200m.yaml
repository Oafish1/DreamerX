# Reaches optimality in 24k steps (1.6h), stabilizes around 33k (2.5h)
name: "Dreamer_200M"

# Model configuration
model:
  global:
    # Guidelines for scaling: Generally depth=classes and units=hidden, then deter is 8xhidden
    # Hidden dimensions
    embedded: 1024  # Units, in original, controls all encoder/decoder layers
    blocks: 64  # Depth, in original
    dense: 1024  # Hidden, in original

    # Bins
    categorical_bins: 64  # Classes, in original

    # Output dimensions
    deterministic_dim: 8192  # Deter, in original
