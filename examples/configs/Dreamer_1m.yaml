# Reaches optimality in 24k steps (1.6h), stabilizes around 33k (2.5h)
name: "Dreamer_1M"

# Model configuration
model:
  global:
    # Guidelines for scaling: Generally depth=classes and units=hidden, then deter is 8xhidden
    # Hidden dimensions
    embedded: 64  # Units, in original, controls all encoder/decoder layers
    blocks: 4  # Depth, in original
    dense: 64  # Hidden, in original

    # Bins
    categorical_bins: 4  # Classes, in original

    # Output dimensions
    deterministic_dim: 512  # Deter, in original
