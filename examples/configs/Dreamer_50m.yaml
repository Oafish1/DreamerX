# Reaches optimality in 24k steps (1.6h), stabilizes around 33k (2.5h)
name: "Dreamer_50M"

# Model configuration
model:
  global:
    # Guidelines for scaling: Generally depth=classes and units=hidden, then deter is 8xhidden
    # Hidden dimensions
    embedded: 512  # Units, in original, controls all encoder/decoder layers
    blocks: 32  # Depth, in original
    dense: 512  # Hidden, in original

    # Bins
    categorical_bins: 32  # Classes, in original

    # Output dimensions
    deterministic_dim: 4096  # Deter, in original
