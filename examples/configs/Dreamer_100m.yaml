# Reaches optimality in 24k steps (1.6h), stabilizes around 33k (2.5h)
name: "Dreamer_100M"

# Model configuration
model:
  global:
    # Guidelines for scaling: Generally depth=classes and units=hidden, then deter is 8xhidden
    # Hidden dimensions
    embedded: 768  # Units, in original, controls all encoder/decoder layers
    blocks: 48  # Depth, in original
    dense: 768  # Hidden, in original

    # Bins
    categorical_bins: 48  # Classes, in original

    # Output dimensions
    deterministic_dim: 6144  # Deter, in original
